<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ION Splash — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap">
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: 'Manrope', -apple-system, system-ui, sans-serif; background: #0F0A2E; color: #fff; }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 80vh;
      overflow: hidden;
      background: #0F0A2E;
    }

    /* Background photo (drop /assets/station.jpg here to enable) */
    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('./assets/station.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.55;
      filter: saturate(1.05) contrast(1.05);
      z-index: 0;
    }

    /* Multicolor gradient overlay — matches the brand CTA button (indigo → purple → magenta) */
    .bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center,
          rgba(15, 10, 46, 0.35) 0%,
          rgba(15, 10, 46, 0.78) 60%,
          rgba(15, 10, 46, 0.95) 100%),
        linear-gradient(135deg,
          rgba(91,  61, 240, 0.55) 0%,
          rgba(123, 63, 228, 0.55) 35%,
          rgba(168, 85, 247, 0.55) 65%,
          rgba(217, 70, 239, 0.55) 100%);
      z-index: 1;
    }

    /* Lottie effects layer (lightning, halo, grid, shimmer) */
    #anim {
      position: relative;
      z-index: 2;
      width: min(360px, 80vw);
      aspect-ratio: 1080 / 1920;
    }

    /* Original SVG logo — perfectly faithful to the source artwork.
       Two stacked SVGs: a faint outline (always visible) + a solid fill that
       rises from bottom to top via clip-path animation. */
    .logo-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(280px, 60vw);
      aspect-ratio: 173.3 / 73.75;
      z-index: 3;
      filter: drop-shadow(0 0 24px rgba(123, 63, 228, 0));
      pointer-events: none;
      transition: filter 0.5s ease-out;
    }
    .logo-overlay.visible { filter: drop-shadow(0 0 24px rgba(123, 63, 228, 0.6)); }
    .logo-overlay svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .logo-overlay svg.outline path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.28);
      stroke-width: 0.4;
      vector-effect: non-scaling-stroke;
    }
    .logo-overlay svg.fill path { fill: #ffffff; }
    .logo-overlay svg.fill {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 2.4s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .logo-overlay.visible svg.fill { clip-path: inset(0 0 0 0); }
    .stage.light .logo-overlay svg.outline path { stroke: rgba(29, 22, 69, 0.3); }
    .stage.light .logo-overlay svg.fill path { fill: #1d1645; }

    .tagline {
      position: absolute;
      left: 50%;
      top: 70%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(22px, 3.6vw, 34px);
      font-weight: 200;
      letter-spacing: 0.01em;
      line-height: 1.15;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.6s ease-out;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(123, 63, 228, 0.6);
      z-index: 4;
      text-align: left;
      display: inline-block;
    }
    .tagline.visible { opacity: 1; }
    .tagline .line { display: block; min-height: 1.15em; }
    /* Second line is offset to the right to mirror the app header style */
    .tagline .line.indent { padding-left: 1.6em; }
    /* Vibrant purple emphasis on "faster" */
    .tagline em {
      font-style: italic;
      font-weight: 600;
      color: #C77DFF;
      text-shadow: 0 0 12px rgba(199, 125, 255, 0.55);
    }
    .stage.light .tagline { color: #1d1645; text-shadow: none; }
    .stage.light .tagline em { color: #7B3FE4; text-shadow: none; }
    /* Typing caret — blinks at end of currently-typing line */
    .tagline .caret {
      display: inline-block;
      width: 0.06em;
      height: 1em;
      margin-left: 0.05em;
      background: currentColor;
      vertical-align: -0.12em;
      opacity: 0.75;
      animation: blink 0.9s steps(2) infinite;
    }
    .tagline .caret.gone { display: none; }
    @keyframes blink { 50% { opacity: 0; } }

    /* App version pinned to the bottom of the stage */
    .app-version {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(11px, 1.4vw, 14px);
      font-weight: 300;
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 4;
    }
    .stage.light .app-version { color: rgba(29, 22, 69, 0.4); }

    .controls { padding: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: #000; }
    button { padding: 8px 14px; border: 1px solid #444; background: #1d1645; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #2a2058; }
    input[type=range] { flex: 1; min-width: 200px; }
    label { font-size: 14px; opacity: 0.8; }
  </style>
</head>

    <div class="tagline" id="tagline">
      <span class="line" id="tag-line-1"></span>
      <span class="line indent" id="tag-line-2"></span>

  </div>
  <div class="controls">
    <button id="play">Play</button>
    <button id="pause">Pause</button>
    <button id="restart">Restart</button>
    <button id="bg-toggle">Toggle background</button>
    <label>Frame: <span id="frame">0</span></label>
    <input type="range" id="scrub" min="0" max="270" value="0" step="1" />
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    const anim = lottie.loadAnimation({
      container: document.getElementById('anim'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: './splash.json',
    });

    document.getElementById('play').onclick    = () => anim.play();
    document.getElementById('pause').onclick   = () => anim.pause();
    document.getElementById('restart').onclick = () => { anim.goToAndStop(0, true); anim.play(); };

    const stage = document.getElementById('stage');
    document.getElementById('bg-toggle').onclick = () => stage.classList.toggle('light');

    const scrub = document.getElementById('scrub');
    const frameLabel = document.getElementById('frame');
    anim.addEventListener('DOMLoaded', () => { scrub.max = anim.totalFrames; });
    // ---- Typewriter for the tagline ----------------------------------------
    // Two lines, each defined as a list of {text, em} segments. Characters are
    // typed one at a time across the segments. A blinking caret follows the
    // active line and disappears when both lines are done.
    const TYPE_TRIGGER_FRAME = 160;       // Lottie frame at which typing starts
    const CHAR_DELAY_MS = 55;             // per-character delay
    const LINE_GAP_MS = 350;              // pause between line 1 and line 2
    const LINE_1 = [{ text: 'Charge ' }, { text: 'faster', em: true }];
    const LINE_2 = [{ text: 'Drive longer' }];

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function makeCaret() {
      const c = document.createElement('span');
      c.className = 'caret';
      c.textContent = ' '; // non-breaking space so caret has line height
      return c;
    }

    async function typeInto(lineEl, segments) {
      lineEl.textContent = '';
      const caret = makeCaret();
      lineEl.appendChild(caret);
      for (const seg of segments) {
        const span = document.createElement('span');
        if (seg.em) {
          const em = document.createElement('em');
          span.appendChild(em);
          for (const ch of seg.text) {
            em.appendChild(document.createTextNode(ch));
            lineEl.insertBefore(span, caret);  // ensure caret stays last
            await sleep(CHAR_DELAY_MS);
          }
        } else {
          for (const ch of seg.text) {
            span.appendChild(document.createTextNode(ch));
            lineEl.insertBefore(span, caret);
            await sleep(CHAR_DELAY_MS);
          }
        }
      }
      return caret;
    }

    function clearTagline() {
      document.getElementById('tag-line-1').textContent = '';
      document.getElementById('tag-line-2').textContent = '';
    }

    let typingState = 'idle'; // 'idle' | 'typing' | 'done'
    async function runTyping() {
      if (typingState !== 'idle') return;
      typingState = 'typing';
      const l1 = document.getElementById('tag-line-1');
      const l2 = document.getElementById('tag-line-2');
      const caret1 = await typeInto(l1, LINE_1);
      caret1.classList.add('gone');
      await sleep(LINE_GAP_MS);
      const caret2 = await typeInto(l2, LINE_2);
      await sleep(1200);
      caret2.classList.add('gone');
      typingState = 'done';
    }

    // ---- Lottie frame listener: fill animation + typing trigger -----------
    anim.addEventListener('enterFrame', (e) => {
      scrub.value = Math.round(e.currentTime);
      frameLabel.textContent = Math.round(e.currentTime);

      const logo = document.getElementById('logo');
      // Logo fill rises from bottom to top after a brief "empty" beat
      logo.classList.toggle('visible', e.currentTime >= 18);

      // Reset typing on loop restart
      if (e.currentTime < TYPE_TRIGGER_FRAME && typingState !== 'idle') {
        typingState = 'idle';
        clearTagline();
        document.getElementById('tagline').classList.remove('visible');
      }
      // Trigger typing once
      if (e.currentTime >= TYPE_TRIGGER_FRAME && typingState === 'idle') {
        document.getElementById('tagline').classList.add('visible');
        runTyping();
      }
    });
    scrub.addEventListener('input', () => {
      anim.goToAndStop(Number(scrub.value), true);
      frameLabel.textContent = scrub.value;
    });
  </script>
</body>
</html>
