<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0A2E" />
  <title>ION — Charge faster. Drive longer.</title>
  <meta name="description" content="ION mobile app splash — premium animated reveal." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700&display=swap">
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
      background: #0F0A2E;
      color: #fff;
      overflow: hidden;
    }

    @keyframes stageFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0F0A2E;
      animation: stageFadeIn 0.6s ease-out both;
    }

    /* Background station photo — Ken Burns zoom-out on load */
    @keyframes photoReveal {
      from { transform: scale(1.6); background-position: 85% 50%; }
      to   { transform: scale(1.0); background-position: 35% 50%; }
    }
    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('./assets/station-2.jpg');
      background-size: cover;
      background-position: 35% 50%;
      opacity: 0.20;
      filter: saturate(1.1) contrast(1.05);
      z-index: 0;
      animation: photoReveal 8s cubic-bezier(0.45, 0, 0.55, 1) forwards;
    }

    /* ── Aceternity-style animated gradient blobs ── */
    @keyframes moveVertical {
      from { transform: translateY(-50%); }
      to   { transform: translateY(50%); }
    }
    @keyframes moveInCircle {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes moveHorizontal {
      from { transform: translateX(-50%) translateY(-10%); }
      to   { transform: translateX(50%) translateY(10%); }
    }

    /* Container for all blobs — sits above photo */
    .gradients-container {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    /* Each blob: large blurred radial gradient, hard-light so it tints the photo */
    .blob {
      position: absolute;
      width: 80%;
      height: 80%;
      top: 10%;
      left: 10%;
      mix-blend-mode: hard-light;
      filter: blur(60px);
      opacity: 1;
    }
    .blob-1 {
      background: radial-gradient(circle at center, rgba(74, 29, 184, 0.90) 0, transparent 60%);
      transform-origin: 15% 50%;
      animation: moveVertical 10s ease-in-out alternate infinite;
    }
    .blob-2 {
      background: radial-gradient(circle at center, rgba(199, 125, 255, 0.90) 0, transparent 60%);
      transform-origin: 85% 50%;
      animation: moveInCircle 7s linear reverse infinite;
    }
    .blob-3 {
      background: radial-gradient(circle at center, rgba(91, 33, 208, 0.85) 0, transparent 60%);
      transform-origin: 50% 15%;
      animation: moveInCircle 12s linear infinite;
    }
    .blob-4 {
      background: radial-gradient(circle at center, rgba(217, 70, 239, 0.80) 0, transparent 60%);
      transform-origin: 85% 85%;
      animation: moveHorizontal 9s ease-in-out alternate infinite;
    }
    .blob-5 {
      background: radial-gradient(circle at center, rgba(168, 85, 247, 0.85) 0, transparent 60%);
      transform-origin: 15% 85%;
      animation: moveInCircle 6s linear infinite;
    }
    .blob-6 {
      background: radial-gradient(circle at center, rgba(45, 12, 150, 0.80) 0, transparent 55%);
      transform-origin: 50% 85%;
      animation: moveHorizontal 11s ease-in-out alternate-reverse infinite;
    }
    .blob-7 {
      background: radial-gradient(circle at center, rgba(139, 40, 255, 0.75) 0, transparent 55%);
      transform-origin: 20% 20%;
      animation: moveInCircle 8s linear reverse infinite;
    }

    /* Dark vignette — darkens edges so logo + text stay readable */
    .bg-vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center,
        transparent 0%,
        rgba(10, 5, 30, 0.45) 55%,
        rgba(10, 5, 30, 0.92) 100%);
      pointer-events: none;
    }

    /* Lottie effects layer */
    #anim {
      position: relative;
      z-index: 3;
      width: min(360px, 80vw);
      aspect-ratio: 1080 / 1920;
    }

    /* Logo: faint outline + solid fill that rises bottom-to-top */
    .logo-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(220px, 48vw);
      aspect-ratio: 173.3 / 73.75;
      z-index: 4;
      filter: drop-shadow(0 0 24px rgba(123, 63, 228, 0));
      pointer-events: none;
      transition: filter 0.5s ease-out;
    }
    @keyframes logoPulse {
      0%   { filter: drop-shadow(0 0 3px rgba(255,255,255,0.9)) drop-shadow(0 0 20px rgba(123,63,228,0.8)) drop-shadow(0 0 50px rgba(123,63,228,0.35)); }
      50%  { filter: drop-shadow(0 0 5px rgba(255,255,255,1.0)) drop-shadow(0 0 36px rgba(139,79,244,1.0)) drop-shadow(0 0 80px rgba(139,79,244,0.55)); }
      100% { filter: drop-shadow(0 0 3px rgba(255,255,255,0.9)) drop-shadow(0 0 20px rgba(123,63,228,0.8)) drop-shadow(0 0 50px rgba(123,63,228,0.35)); }
    }
    .logo-overlay.visible {
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.9)) drop-shadow(0 0 20px rgba(123,63,228,0.8)) drop-shadow(0 0 50px rgba(123,63,228,0.35));
      animation: logoPulse 2.5s ease-in-out 2.4s infinite;
    }
    .logo-overlay svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .logo-overlay svg.outline path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.65);
      stroke-width: 0.6;
      vector-effect: non-scaling-stroke;
    }
    .logo-overlay svg.fill path { fill: #ffffff; }
    .logo-overlay svg.fill {
      clip-path: inset(100% 0 0 0);
      transition: clip-path 2.4s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .logo-overlay.visible svg.fill { clip-path: inset(0 0 0 0); }

    .tagline {
      position: absolute;
      left: 50%;
      top: calc(60% + 20px);
      transform: translateX(-50%) translateY(-50%);
      width: min(220px, 48vw);
      color: #ffffff;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(22px, 3.6vw, 34px);
      font-weight: 200;
      letter-spacing: 0.01em;
      line-height: 1.15;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-50%) translateY(calc(-50% + 10px));
      transition: opacity 0.6s ease-out, transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      pointer-events: none;
      text-shadow: 0 0 20px rgba(123, 63, 228, 0.6);
      z-index: 5;
      text-align: right;
    }
    .tagline.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-50%);
    }
    .tagline .line {
      display: block;
      min-height: 1.15em;
      box-sizing: border-box;
    }
    .tagline .line.indent { padding-right: 0; }
    .tagline em {
      font-style: italic;
      font-weight: 600;
      color: #C77DFF;
      text-shadow: 0 0 12px rgba(199, 125, 255, 0.55);
    }

    .app-version {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(13px, 1.8vw, 16px);
      font-weight: 500;
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    const anim = lottie.loadAnimation({
      container: document.getElementById('anim'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: './splash.json',
    });

    const TYPE_TRIGGER_FRAME = 160;
    const CHAR_DELAY_MS = 55;
    const LINE_GAP_MS = 350;
    const LINE_1 = [{ text: 'Charge ' }, { text: 'faster', em: true }];
    const LINE_2 = [{ text: 'Drive longer' }];

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function typeInto(lineEl, segments) {
      lineEl.textContent = '';
      for (const seg of segments) {
        const wrapper = seg.em ? document.createElement('em') : document.createElement('span');
        lineEl.appendChild(wrapper);
        for (const ch of seg.text) {
          wrapper.appendChild(document.createTextNode(ch));
          await sleep(CHAR_DELAY_MS);
        }
      }
    }

    function clearTagline() {
      document.getElementById('tag-line-1').textContent = '';
      document.getElementById('tag-line-2').textContent = '';
    }

    function lockLineWidth(lineEl, segments) {
      lineEl.textContent = '';
      for (const seg of segments) {
        const wrapper = seg.em ? document.createElement('em') : document.createElement('span');
        wrapper.textContent = seg.text;
        lineEl.appendChild(wrapper);
      }
      const w = lineEl.offsetWidth;
      lineEl.textContent = '';
      lineEl.style.minWidth = w + 'px';
    }

    // One-shot reveal: logo fills once, tagline types once. The Lottie loops in
    // the background (grid pulse) but the logo + tagline never replay.
    let logoTriggered = false;
    let typingTriggered = false;

    async function runTyping() {
      if (typingTriggered) return;
      typingTriggered = true;
      const l1 = document.getElementById('tag-line-1');
      const l2 = document.getElementById('tag-line-2');
      lockLineWidth(l1, LINE_1);
      lockLineWidth(l2, LINE_2);
      document.getElementById('tagline').classList.add('visible');
      await typeInto(l1, LINE_1);
      await sleep(LINE_GAP_MS);
      await typeInto(l2, LINE_2);
      // Hold for a beat then fade the whole splash out
      await sleep(2000);
      const stage = document.getElementById('stage');
      stage.style.transition = 'opacity 0.8s ease-out';
      stage.style.opacity = '0';
    }

    anim.addEventListener('enterFrame', (e) => {
      if (!logoTriggered && e.currentTime >= 18) {
        logoTriggered = true;
        document.getElementById('logo').classList.add('visible');
      }
      if (!typingTriggered && e.currentTime >= TYPE_TRIGGER_FRAME) {
        runTyping();
      }
    });
  </script>
